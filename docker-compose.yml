services:
  postgres:
    image: postgres:16
    container_name: gammaboard
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gammaboard_db
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d gammaboard_db || exit 1"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
