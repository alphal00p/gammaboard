[package]
name = "gammaboard"
version = "0.1.0"
edition = "2024"

[dependencies]
gammaloop = { package = "gammalooprs", path = "../gammaloop" }
tokio = { version = "1.46", features = ["full"] }
sqlx = { version = "0.7", features = ["postgres", "runtime-tokio-native-tls", "chrono", "macros"] }
dotenvy = "0.15"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
axum = "0.7"
futures-core = "0.3"
tower = "0.5"
tower-http = { version = "0.5", features = ["fs", "cors"] }
clap = { version = "4.5", features = ["derive"] }
toml = "0.8"
async-trait = "0.1"
thiserror = "2.0"
symbolica = "1.3.1"
ndarray = "0.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
enum_dispatch = "0.3"
strum = { version = "0.27", features = ["derive"] }
num = "0.4.3"

[lib]
name = "gammaboard"
crate-type = ["rlib"]


[patch.crates-io]
idenso = { git = "https://github.com/alphal00p/spenso", rev = "1ac24e7bdccd3f5190dc14c12fe98b786af4c612" }
spenso = { git = "https://github.com/alphal00p/spenso", rev = "1ac24e7bdccd3f5190dc14c12fe98b786af4c612" }
spenso-hep-lib = { git = "https://github.com/alphal00p/spenso", rev = "1ac24e7bdccd3f5190dc14c12fe98b786af4c612" }
spenso-macros = { git = "https://github.com/alphal00p/spenso", rev = "1ac24e7bdccd3f5190dc14c12fe98b786af4c612" }
vakint={git="https://github.com/alphal00p/vakint",rev="10ffd4e8559696b1dc79b21ef3e700caac663aa8"}
linnet = { git = "https://github.com/alphal00p/linnet", rev = "d8c02a0a7b96ac8d46a8770097c354535cd4baff" }
