[package]
name = "gammaboard"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.46", features = ["full"] }
sqlx = { version = "0.7", features = ["postgres", "runtime-tokio-native-tls", "chrono", "macros"] }
dotenvy = "0.15"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
axum = "0.7"
futures-core = "0.3"
tower = "0.5"
tower-http = { version = "0.5", features = ["fs", "cors"] }
clap = { version = "4.5", features = ["derive"] }
toml = "0.8"
async-trait = "0.1"
thiserror = "2.0"
symbolica = "1.3.1"
ndarray = "0.16"

[lib]
name = "gammaboard"
crate-type = ["rlib"]
