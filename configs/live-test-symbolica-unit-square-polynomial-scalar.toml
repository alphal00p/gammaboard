name = "symbolica-unit-square-x2-plus-y4-scalar"
evaluator_implementation = "symbolica"
sampler_aggregator_implementation = "havana"
observable_implementation = "scalar"
parametrization_implementation = "none"

[point_spec]
continuous_dims = 2
discrete_dims = 0

[evaluator_runner_params]
min_loop_time_ms = 200
performance_snapshot_interval_ms = 5000

[evaluator_params]
expr = "x^2 + y^4"
args = ["x", "y"]

[sampler_aggregator_runner_params]
interval_ms = 500
lease_ttl_ms = 5000
nr_samples = 64
performance_snapshot_interval_ms = 5000
max_batches_per_tick = 128
max_pending_batches = 128
completed_batch_fetch_limit = 512

[sampler_aggregator_params]
seed = 0
continuous_dims = 2
bins = 64
min_samples_for_update = 1024
batches_for_update = 256
stop_training_after_n_batches = 4096
initial_training_rate = 0.1
final_training_rate = 0.001

[observable_params]

[parametrization_params]
