# todo: create run-cargd to make the state

name = "gammaloop-triangle"

[evaluator]
kind = "gammaloop"
# Path to a pre-generated GammaLoop state folder containing model/process/integrand artifacts.
state_folder = "/home/cedricsigrist/Workspace/repos/gammaloop/my_states/triangle"
# Optional override for model file location. If omitted, defaults to "<state_folder>/model.json".
# Optional process/integrand selectors. If omitted, GammaLoop's single-process/single-integrand fallback applies.
# process_id = 0
# integrand_name = "triangle"
momentum_space = false
use_f128 = false
training_projection = "abs"
continuous_dims = 3
discrete_dims = 0

[sampler_aggregator]
kind = "havana"
seed = 0
bins = 64
min_samples_for_update = 1024
samples_for_update = 16384
stop_training_after_n_samples = 65536
initial_training_rate = 0.1
final_training_rate = 0.001

[observable]
kind = "complex"

[parametrization]
kind = "none" # "spherical"

[evaluator_runner_params]
min_loop_time_ms = 5
performance_snapshot_interval_ms = 2000

[sampler_aggregator_runner_params]
min_poll_time_ms = 50
performance_snapshot_interval_ms = 2000
target_batch_eval_ms = 200.0
target_queue_remaining = 0.8
lease_ttl_ms = 5000
max_batch_size = 1024
max_batches_per_tick = 64
max_queue_size = 128
completed_batch_fetch_limit = 1024
