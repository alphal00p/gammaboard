# Shared defaults merged into every `control_plane run-add <config.toml>` payload.
# `name` is intentionally omitted and must be provided per run.

[evaluator]
kind = "unit"
continuous_dims = 1
discrete_dims = 0

[sampler_aggregator]
kind = "naive_monte_carlo"

[observable]
kind = "scalar"

[parametrization]
kind = "none"

[evaluator_runner_params]
min_loop_time_ms = 20.0
performance_snapshot_interval_ms = 2000

[sampler_aggregator_runner_params]
min_poll_time_ms = 100
performance_snapshot_interval_ms = 2000
target_batch_eval_ms = 100.0
target_queue_remaining = 0.5
lease_ttl_ms = 5000
max_batch_size = 1024
max_queue_size = 1024
max_batches_per_tick = 8
completed_batch_fetch_limit = 1024
