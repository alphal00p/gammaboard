name = "symbolica-poly-test"
target = { kind = "scalar", value = 1.0 }

[evaluator]
kind = "symbolica"
expr = "x^2 + y^2 + z^2"
args = ["x", "y", "z"]

[sampler_aggregator]
kind = "naive_monte_carlo"

[parametrization]
kind = "identity"

[evaluator_runner_params]
min_loop_time_ms = 0
performance_snapshot_interval_ms = 2000

[sampler_aggregator_runner_params]
min_poll_time_ms = 100
performance_snapshot_interval_ms = 2000
target_batch_eval_ms = 400.0
target_queue_remaining = 0.5
max_batch_size = 64
max_batches_per_tick = 16
max_queue_size = 128
completed_batch_fetch_limit = 1024
