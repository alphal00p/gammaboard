# Shared CLI/runtime settings used by all commands.
# Keep deploy and server host/auth settings out of this file.
[database]
url = "postgresql://postgres:NqVj2yt5WsCE5nYCOx01MkeFD8n8awoZ@127.0.0.1:5433/gammaboard_db"

[tracing]
persist_runtime_logs = true
db_gammaboard_level = "info"
db_external_level = "warn"

[local_postgres]
data_dir = ".postgres"
socket_dir = ".postgres-socket"
log_file = ".postgres/logfile"
max_connections = 512
shared_buffers = "4GB"
effective_cache_size = "32GB"
work_mem = "64MB"
checkpoint_timeout = "30min"
max_wal_size = "8GB"
wal_compression = true
synchronous_commit = false
