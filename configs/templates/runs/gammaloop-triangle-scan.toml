# Example Gammaloop run template.
# Assumes `gammaloop` is a sister folder of `gammaboard`.
# Add tasks from the dashboard task templates after creating the run.
name = "gammaloop-triangle-scan"

[evaluator]
kind = "gammaloop"
state_folder = "../gammaloop/my_triangle/state"
momentum_space = true
use_f128 = false
training_projection = "abs"
observable_kind = "complex"
continuous_dims = 3
discrete_dims = 0

[parametrization]
kind = "identity"
