# GammaLoop triangle workflow using the new sample task model.
# Sequence:
# 1) train (100k)
# 2) sample (100k, havana_inference)
# 3) line plot
# 4) x-z image plot over (-50, 50)^2
# 5) resume training from task "sample-initial"
# 6) sample again (100k, havana_inference)

[[task_queue]]
name = "train-initial"
kind = "sample"
nr_samples = 100_000
observable = { config = "complex" }
sampler_aggregator = { config = { kind = "havana_training", seed = 0, bins = 64, min_samples_for_update = 1024, samples_for_update = 16384, initial_training_rate = 0.1, final_training_rate = 0.001 } }

[[task_queue]]
name = "sample-initial"
kind = "sample"
nr_samples = 100_000
sampler_aggregator = { config = { kind = "havana_inference" } }

[[task_queue]]
kind = "plot_line"
observable = "complex"
[task_queue.geometry]
offset = [0.0, 0.0, 0.0]
direction = [1.0, 0.0, 0.0]
linspace = { start = -50.0, stop = 50.0, count = 1024 }
discrete = []

[[task_queue]]
kind = "image"
observable = "complex"
[task_queue.geometry]
offset = [0.0, 0.0, 0.0]
u_vector = [1.0, 0.0, 0.0]
v_vector = [0.0, 0.0, 1.0]
u_linspace = { start = -50.0, stop = 50.0, count = 512 }
v_linspace = { start = -50.0, stop = 50.0, count = 512 }
discrete = []

[[task_queue]]
name = "train-resume"
kind = "sample"
nr_samples = 100_000
sampler_aggregator = { from_name = "sample-initial" }
observable = { from_name = "sample-initial" }

[[task_queue]]
kind = "sample"
nr_samples = 100_000
sampler_aggregator = { config = { kind = "havana_inference" } }
