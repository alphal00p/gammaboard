name = "symbolica-sin-test"
target = { kind = "scalar", value = 0.45969769413186023 }

[evaluator]
kind = "symbolica"
expr = "sin(x)"
args = ["x"]

[sampler_aggregator]
kind = "naive_monte_carlo"

[evaluator_runner_params]
performance_snapshot_interval_ms = 2000

[sampler_aggregator_runner_params]
performance_snapshot_interval_ms = 2000
aggregation_persist_interval_ms = 1000
target_batch_eval_ms = 400.0
target_queue_horizon_ticks = 2.0
max_batch_size = 64
max_batches_per_tick = 16
max_queue_size = 128
completed_batch_fetch_limit = 1024
strict_batch_ordering = true
