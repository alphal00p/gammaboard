# Shared defaults merged into every `gammaboard run add <config.toml>` payload.
# `name` is intentionally omitted and must be provided per run.
[evaluator]
kind = "unit"
continuous_dims = 1
discrete_dims = 0

[evaluator_runner_params]
performance_snapshot_interval_ms = 2000
min_tick_time_ms = 50

[sampler_aggregator_runner_params]
performance_snapshot_interval_ms = 2000
min_tick_time_ms = 10
frontend_sync_interval_ms = 2000
target_batch_eval_ms = 1500.0
max_batch_size = 65536

[sampler_aggregator_runner_params.queue]
queue_buffer = 10.0
max_queue_size = 1024
max_batches_per_tick = 16
completed_batch_fetch_limit = 16
strict_batch_ordering = true
